<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Received — Straight Fin Farms</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f3ef;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
      text-align: center;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #3d8c40, #2d6e30);
      padding: 32px 24px;
    }
    .check-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
    }
    .body {
      padding: 32px 28px 40px;
    }
    .body p {
      font-size: 16px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 16px;
    }
    .body p:last-child { margin-bottom: 0; }
    .body a { color: #3d8c40; text-decoration: none; }
    .body a:hover { text-decoration: underline; }
    .muted { font-size: 14px !important; color: #888 !important; margin-top: 24px !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="check-icon">&#10003;</div>
      <h1>Payment Received!</h1>
    </div>
    <div class="body">
      <p>Thank you! Your credit card payment has been successfully processed.</p>
      <p>Deniz will review your payment and send you a <strong>final confirmation email</strong> with check-in details and directions to the property shortly.</p>
      <p class="muted">You can close this tab. Questions? Email <a href="mailto:straightfinfarms@gmail.com">straightfinfarms@gmail.com</a></p>
    </div>
  </div>
</body>
</html>
